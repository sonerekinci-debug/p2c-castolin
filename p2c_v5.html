<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2C — Tekliften Teslimata | Castolin Eutectic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f5f5f3;color:#1a1a1a}

/* ── LOGIN ── */
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f0ee}
.login-box{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:32px;width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:18px;font-weight:700}
.login-logo p{font-size:12px;color:#888;margin-top:4px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:5px;text-transform:uppercase}
.lf input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:7px;font-size:13px}
.lf input:focus{outline:none;border-color:#185FA5}
.login-btn{width:100%;padding:10px;background:#185FA5;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
.login-btn:hover{background:#0c447c}
.login-err{color:#a32d2d;font-size:12px;margin-top:8px;text-align:center;min-height:18px}

/* ── APP ── */
#appWrap{display:none}
.topbar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:14px;font-weight:700;flex:1}
.user-pill{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.nav{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto}
.nb{padding:9px 16px;font-size:12px;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500}
.nb.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700}
.notif{display:inline-block;background:#e24b4a;color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;margin-left:3px;vertical-align:middle}
.content{padding:14px;background:#f5f5f3;min-height:calc(100vh - 90px)}

/* ── BADGES ── */
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.b-green{background:#e8f5e9;color:#1b5e20}
.b-amber{background:#fff3e0;color:#7c4200}
.b-blue{background:#e3f2fd;color:#0d47a1}
.b-red{background:#ffebee;color:#7f1010}
.b-gray{background:#f5f5f5;color:#555}
.b-purple{background:#ede7f6;color:#311b92}
.b-orange{background:#fff3e0;color:#e65100}
.b-teal{background:#e0f2f1;color:#004d40}

/* ── CARDS ── */
.card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:12px;overflow:hidden}
.card-head{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #e5e5e5;gap:8px}
.card-title{font-size:13px;font-weight:700;flex:1}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:12px 14px}
.kpi-lbl{font-size:10px;color:#888;margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:700}
.kv-blue{color:#185FA5}.kv-green{color:#2d7a2d}.kv-amber{color:#b06000}.kv-red{color:#a32d2d}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{padding:6px 10px;text-align:left;font-size:10px;font-weight:700;color:#666;background:#f9f9f7;border-bottom:1px solid #e5e5e5;white-space:nowrap}
.tbl th.gh{text-align:center;font-size:10px}
.tbl td{padding:6px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.tbl tr:hover td{background:#fafaf8;cursor:pointer}
.tbl tr:last-child td{border-bottom:none}
/* Dept column borders */
.th-satis{background:#EBF3FD;color:#0C447C;border-left:2px solid #BBDEFB}
.th-teknik{background:#E8EAF6;color:#283593;border-left:2px solid #9FA8DA}
.th-uretim{background:#FFF8F0;color:#854F0B;border-left:2px solid #FFE0B2}
.th-onay{background:#F8F0FC;color:#3C3489;border-left:2px solid #E1BEE7}
.th-planlama{background:#F8F0FC;color:#3C3489;border-left:2px solid #E1BEE7}
.th-qc{background:#F0FAF0;color:#1b5e20;border-left:2px solid #C8E6C9}
.th-muhasebe{background:#F5F0FC;color:#311b92;border-left:2px solid #D1C4E9}
.th-sevkiyat{background:#F0FAF8;color:#004d40;border-left:2px solid #B2DFDB}
.gh-satis{background:#E3F2FD;color:#0C447C}
.gh-teknik{background:#E8EAF6;color:#283593}
.gh-uretim{background:#FFF3E0;color:#854F0B}
.gh-onay{background:#F3E5F5;color:#3C3489}
.gh-planlama{background:#F3E5F5;color:#3C3489}
.gh-qc{background:#E8F5E9;color:#1b5e20}
.gh-muhasebe{background:#EDE7F6;color:#311b92}
.gh-sevkiyat{background:#E0F2F1;color:#004d40}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:300;overflow-y:auto;padding:16px}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:#fff;border-radius:12px;width:100%;max-width:660px;border:1px solid #ddd;margin-top:10px}
.modal-head{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #e5e5e5;gap:8px}
.modal-head h2{font-size:14px;font-weight:700;flex:1}
.mtabs{display:flex;border-bottom:1px solid #e5e5e5;overflow-x:auto;background:#f9f9f7}
.mtab{padding:8px 14px;font-size:12px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500}
.mtab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700}
.mbody{padding:14px 16px;display:none}
.mbody.active{display:block}
.action-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #e5e5e5;justify-content:flex-end;flex-wrap:wrap}

/* ── FORM ── */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.frow.full{grid-template-columns:1fr}
.frow.three{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:0.02em}
.fg input,.fg select,.fg textarea{font-size:12px;padding:7px 9px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;width:100%}
.fg input:disabled,.fg select:disabled,.fg textarea:disabled{background:#f9f9f7;color:#aaa;cursor:not-allowed}
.fg textarea{min-height:55px;resize:vertical}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:8px 0 6px;margin-bottom:4px;border-bottom:2px solid}
.sec-lbl.satis{color:#1565C0;border-color:#E3F2FD}
.sec-lbl.teknik{color:#283593;border-color:#E8EAF6}
.sec-lbl.uretim{color:#E65100;border-color:#FFF3E0}
.sec-lbl.onay{color:#6A1B9A;border-color:#F3E5F5}
.sec-lbl.planlama{color:#6A1B9A;border-color:#F3E5F5}
.sec-lbl.qc{color:#2E7D32;border-color:#E8F5E9}
.sec-lbl.muhasebe{color:#4527A0;border-color:#EDE7F6}
.sec-lbl.sevkiyat{color:#00695C;border-color:#E0F2F1}

/* ── BTNS ── */
.btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#444}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0c447c}
.btn-success{background:#2d7a2d;color:#fff;border-color:#2d7a2d}
.btn-danger{color:#a32d2d;border-color:#f0a0a0}
.btn-danger:hover{background:#ffebee}
.btn-sm{font-size:11px;padding:3px 9px}

/* ── DURUM AKIŞ ── */
.akis-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:700;border:1px solid}

/* ── KALEM ── */
.kalem-box{border:1px solid #e0e0e0;border-radius:8px;padding:12px;margin-bottom:10px;background:#fafaf8}
.kalem-head{font-size:11px;font-weight:700;margin-bottom:10px;color:#555}

/* ── DASHBOARD ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.aksiyon-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f5f5f5;font-size:11px}
.aksiyon-item:last-child{border-bottom:none}
.aksiyon-pn{font-weight:700;color:#185FA5;min-width:85px}
.aksiyon-desc{flex:1;color:#666}
.aksiyon-eksik{font-size:10px;padding:2px 7px;border-radius:4px;background:#FCEBEB;color:#791F1F;font-weight:600;white-space:nowrap}
.pbar-wrap{display:flex;align-items:center;gap:6px}
.pbar{width:50px;height:4px;border-radius:2px;background:#eee;overflow:hidden}
.pfill{height:100%;border-radius:2px}

.alert-warn{background:#fff8e1;border:1px solid #f59e0b;color:#7c4200;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.lock-note{font-size:11px;color:#aaa;padding:12px 0;font-style:italic}

@media(max-width:600px){.kpi-grid{grid-template-columns:1fr 1fr}.frow{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <h1>Castolin Eutectic</h1>
      <p>P2C — Tekliften Teslimata</p>
    </div>
    <div class="lf"><label>E-posta</label><input type="email" id="lEmail" placeholder="ad.soyad@castolin.com" autocomplete="email"></div>
    <div class="lf"><label>Şifre</label><input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="login-btn" onclick="doLogin()">Giriş Yap</button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appWrap">
  <div class="topbar">
    <div class="topbar-logo">P2C — Tekliften Teslimata</div>
    <span id="userPill" class="user-pill"></span>
    <button class="btn btn-sm" onclick="doLogout()">Çıkış</button>
    <span id="ss" style="font-size:11px;color:#888;margin-left:6px"></span>
  </div>
  <div class="nav" id="mainNav"></div>
  <div class="content" id="mainContent"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeMBg(event)">
  <div class="modal" id="modalInner" onclick="event.stopPropagation()"></div>
</div>

<script>
const SB  = 'https://izbvahthrbwthsvboxox.supabase.co';
const KEY = 'sb_publishable_qkvvbA0Q89Sfv1PnQdhlPA_KIZr58Kx';

/* ── LİSTELER ── */
const KATEGORILER = ['CDP/CastoTube – Cut and or Fabricated Parts','Shop Welding & Brazing Applications','Site Welding Work','Shop Boiler/Vessel Coating incl. Tube Armour','Site Boiler/Vessel Coating incl. Tube Armour','Shop Coating Applications','Carrier Deck Coating','LaserClad Applications','VRM and Roller Press Work'];
const TEKLIF_DURUM_MUSTERI = ['DEĞERLENDİRMEDE','ONAYLANDI','OLUMSUZ - YÜKSEK FİYAT','OLUMSUZ - UZUN TERMİN','OLUMSUZ - TEKNİK EKSİKLİK(RESİM VS.)','OLUMSUZ - GARANTİ RİSK','OLUMSUZ - ÖDEME ŞARTLARI','OLUMSUZ - ONARIM YERİNE DEĞİŞİM'];
const TEKNIK_SARTNAME = ['Eklendi','Teknik resim eksik','Şartname eksik','Henüz yok'];
const IC_ONAY_SECENEKLER = ['Onaylandı','Reddedildi','Red-Fiyat düşük','Red- İş riskli'];
const URETIM_DURUM = ['Çalışılıyor','Müşteriden Bilgi Bekleniyor','Tamamlandı','Beklemede'];
const KALEM_URETIM_DURUM = ['Bekliyor','Çalışılıyor','Beklemede','Tamamlandı'];
const PROJE_GENEL_DURUM = ['Planlamada','Üretimde','QC Bekliyor','Kısmi Tamamlandı','Sevkiyatta','Tamamlandı'];
const SATISCILAR = ['Yiğit AYDOĞAN','Müslüm KAÇAR','Emrah ULUOCAK','Çağlar SAYAN','Tuğberk UZUN','Özgür Habib TUŞTAŞ','Cihan GÜRSES','Serhan KARABIYIKOĞLU','Soner EKİNCİ'];
const KONTROLCULAR = [...SATISCILAR,'Murat TUĞUT','Bertuğ SUNGUR','Ekin Can SAKARSU','Memet SALMAN'];
const TEKLIF_HAZIRLAYAN = ['Bertuğ SUNGUR','Ekin Can SAKARSU','Soner EKİNCİ'];

/* ── YETKI ── */
const DEPT_YETKİ = {
  'Genel Müdür':            {tam:true,  onay:true,  teklif:true,  tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Satış Direktörü':        {tam:false, onay:true,  teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Satış Destek':           {tam:true,  onay:true,  teklif:true,  tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Teknik Satış Mühendisi': {tam:false, onay:false, teklif:true,  tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Planlama':               {tam:false, onay:false, teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Üretim':                 {tam:false, onay:false, teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Kalite':                 {tam:true,  onay:false, teklif:true,  tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Muhasebe':               {tam:false, onay:false, teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Sevkiyat':               {tam:false, onay:false, teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
};

/* Hangi departman hangi sekmeyi düzenleyebilir */
const EDIT_PERM = {
  satis:   ['Satış Destek','Genel Müdür','Kalite'],
  teknik:  ['Teknik Satış Mühendisi','Satış Destek','Genel Müdür','Kalite'],
  uretim:  ['Üretim','Satış Destek','Genel Müdür','Kalite'],
  onay:    ['Genel Müdür','Satış Direktörü','Satış Destek','Kalite'],
  planlama:['Planlama','Satış Destek','Genel Müdür','Kalite'],
  qc:      ['Kalite','Satış Destek','Genel Müdür'],
  muhasebe:['Muhasebe','Satış Destek','Genel Müdür','Kalite'],
  sevkiyat:['Sevkiyat','Satış Destek','Genel Müdür','Kalite'],
};

let me = null;
let db = {teklifler:[], projeler:[], kalemler:[]};
let currentTab = 'dashboard';
let authToken = null;

/* ── AUTH ── */
async function doLogin(){
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  if(!email||!pass){setErr('E-posta ve şifre giriniz.');return;}
  setErr('');
  try{
    const r = await fetch(`${SB}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'apikey':KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error_description||'Giriş başarısız');
    authToken = d.access_token;
    const pRes = await fetch(`${SB}/rest/v1/kullanici_profilleri?email=eq.${encodeURIComponent(email)}&select=*`,{
      headers:{'apikey':KEY,'Authorization':'Bearer '+authToken}
    });
    const pData = await pRes.json();
    if(!pData.length) throw new Error('Kullanıcı profili bulunamadı.');
    me = pData[0];
    startApp();
  }catch(e){setErr(e.message);}
}

function setErr(m){document.getElementById('lErr').textContent=m;}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('lPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});

function doLogout(){
  me=null;authToken=null;
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('appWrap').style.display='none';
}

function startApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  const d=DEPT_YETKİ[me.departman]||{};
  const renk = {
    'Genel Müdür':'#E3F2FD','Satış Direktörü':'#E3F2FD','Satış Destek':'#E3F2FD',
    'Teknik Satış Mühendisi':'#E8EAF6','Planlama':'#F3E5F5','Üretim':'#FFF3E0',
    'Kalite':'#E8F5E9','Sevkiyat':'#E0F2F1','Muhasebe':'#EDE7F6'
  }[me.departman]||'#f5f5f5';
  const txtRenk = {
    'Genel Müdür':'#0C447C','Satış Direktörü':'#0C447C','Satış Destek':'#0C447C',
    'Teknik Satış Mühendisi':'#283593','Planlama':'#3C3489','Üretim':'#854F0B',
    'Kalite':'#1b5e20','Sevkiyat':'#004d40','Muhasebe':'#311b92'
  }[me.departman]||'#333';
  const pill = document.getElementById('userPill');
  pill.textContent=`${me.ad_soyad||me.email} — ${me.departman}`;
  pill.style.cssText=`background:${renk};color:${txtRenk};font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600`;
  loadAll();
}

/* ── API ── */
async function api(table,params='',method='GET',body=null){
  const h={'apikey':KEY,'Authorization':'Bearer '+(authToken||KEY),'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH') h['Prefer']='return=representation';
  const r=await fetch(`${SB}/rest/v1/${table}?${params}`,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok) throw new Error(await r.text());
  if(method==='DELETE') return true;
  const t=await r.text(); return t?JSON.parse(t):[];
}

async function loadAll(){
  setSS('Yükleniyor...');
  try{
    const [t,p,k]=await Promise.all([
      api('teklifler','select=*&order=created_at.desc'),
      api('projeler','select=*&order=created_at.desc'),
      api('kalemler','select=*&order=pn.asc,kalem_sira.asc')
    ]);
    db={teklifler:t,projeler:p,kalemler:k};
    setSS(''); buildNav(); renderTab(currentTab);
  }catch(e){setSS('Hata: '+e.message);}
}

function setSS(m){document.getElementById('ss').textContent=m;}

/* ── NAV ── */
function buildNav(){
  const d=DEPT_YETKİ[me.departman]||{};
  const onayCount=db.teklifler.filter(t=>t.akis_durumu==='ONAY BEKLİYOR').length;
  const tabs=[
    {id:'dashboard',label:'Dashboard'},
    {id:'teklifler',label:'Teklifler'},
    {id:'projeler',label:'Projeler'},
    {id:'onaylar',label:'Onaylar',notif:onayCount},
    ...(d.teklif?[{id:'yeni',label:'+ Yeni Teklif'}]:[])
  ];
  document.getElementById('mainNav').innerHTML=tabs.map(t=>
    `<button class="nb ${currentTab===t.id?'active':''}" onclick="showTab('${t.id}')">${t.label}${t.notif?`<span class="notif">${t.notif}</span>`:''}</button>`
  ).join('');
}

function showTab(tab){currentTab=tab;buildNav();renderTab(tab);}

function renderTab(tab){
  const c=document.getElementById('mainContent');
  if(tab==='dashboard') c.innerHTML=renderDashboard();
  else if(tab==='teklifler') c.innerHTML=renderTeklifler();
  else if(tab==='projeler') c.innerHTML=renderProjeler();
  else if(tab==='onaylar') c.innerHTML=renderOnaylar();
  else if(tab==='yeni') c.innerHTML=renderYeniTeklif();
}

/* ── HELPERS ── */
function canEdit(sekme){
  return (EDIT_PERM[sekme]||[]).includes(me.departman);
}
function sb(s){
  if(!s) return '<span class="badge b-gray">—</span>';
  if(['ONAYLANDI','Tamamlandı','Eklendi','Onaylandı'].includes(s)) return `<span class="badge b-green">${s}</span>`;
  if(['ONAY BEKLİYOR','DEĞERLENDİRMEDE','Çalışılıyor'].includes(s)) return `<span class="badge b-amber">${s}</span>`;
  if(s.startsWith('OLUMSUZ')||s==='Reddedildi') return `<span class="badge b-red">${s.length>20?s.substring(0,20)+'…':s}</span>`;
  if(['ÜRETİME SEVKEDİLDİ','Üretimde','QC BEKLİYOR','FATURA BEKLİYOR','SEVKİYAT BEKLİYOR'].includes(s)) return `<span class="badge b-blue">${s}</span>`;
  if(['PROJE KODU EKLENMELİ','TEKNİK ŞARTNAME BEKLİYOR','ÜRETİM BEKLİYOR'].includes(s)) return `<span class="badge b-orange">${s}</span>`;
  return `<span class="badge b-gray">${s}</span>`;
}
function catb(k){
  if(!k) return '<span class="badge b-gray">—</span>';
  const s=k.length>14?k.substring(0,14)+'…':k;
  if(k.includes('Cut')||k.includes('LaserClad')||k.includes('VRM')) return `<span class="badge b-blue" title="${k}">${s}</span>`;
  if(k.includes('Welding')||k.includes('Boiler')) return `<span class="badge b-amber" title="${k}">${s}</span>`;
  if(k.includes('Coating')||k.includes('Carrier')) return `<span class="badge b-teal" title="${k}">${s}</span>`;
  return `<span class="badge b-gray" title="${k}">${s}</span>`;
}
function opts(arr,sel='',blank=false){
  return (blank?'<option value="">—</option>':'')+arr.map(v=>`<option${v===sel?' selected':''}>${v}</option>`).join('');
}
function dis(edit){return edit?'':'disabled';}
function today(){return new Date().toISOString().split('T')[0];}
function daysDiff(d){if(!d)return null;const diff=Math.round((new Date(d)-new Date())/(1000*60*60*24));return diff;}

function checkTN(val){
  const warn=document.getElementById('yt_tn_warn');
  if(warn) warn.style.display=db.teklifler.find(t=>t.tn===val.trim())?'block':'none';
}

async function saveTeklif(){
  const tn=document.getElementById('yt_tn').value.trim();
  const musteri=document.getElementById('yt_musteri').value.trim();
  const kategori=document.getElementById('yt_kategori').value;
  const tanim=document.getElementById('yt_tanim').value.trim();
  if(!tn||!musteri||!kategori||!tanim){alert('TN, müşteri, kategori ve iş tanımı zorunludur.');return;}

  // Revizyon no hesapla
  const mevcutlar=db.teklifler.filter(t=>t.tn===tn);
  const revizyon_no=mevcutlar.length>0?Math.max(...mevcutlar.map(t=>t.revizyon_no||0))+1:0;

  // Mevcut TN varsa verilerini kopyala
  const onceki=mevcutlar.length>0?mevcutlar[mevcutlar.length-1]:null;

  try{
    await api('teklifler','','POST',{
      tn,
      revizyon_no,
      talep_tarihi:document.getElementById('yt_tarih').value,
      teknik_satis_muh:document.getElementById('yt_muh').value||onceki?.teknik_satis_muh||null,
      musteri_adi:musteri,
      musteri_yetkilisi:document.getElementById('yt_yetkili').value||onceki?.musteri_yetkilisi||null,
      fatura_adresi:document.getElementById('yt_fadres').value||onceki?.fatura_adresi||null,
      sevk_adresi:onceki?.sevk_adresi||null,
      kategori,
      is_tanimi:tanim,
      akis_durumu:'TEKNİK ŞARTNAME BEKLİYOR'
    });
    await loadAll(); showTab('teklifler');
  }catch(e){alert('Hata: '+e.message);}
}

async function savePlanlama(pn){
  const yeniPn=document.getElementById('pp_pn').value.trim();
  if(!yeniPn){alert('Proje No zorunludur.');return;}

  // PN değiştiyse önce güncelle
  const proj=db.projeler.find(x=>x.pn===pn);
  if(yeniPn!==pn){
    if(db.projeler.find(p=>p.pn===yeniPn)){alert('Bu PN zaten mevcut!');return;}
    // Kalemler tablosunu da güncelle
    await api('kalemler',`pn=eq.${pn}`,'PATCH',{pn:yeniPn});
    await api('projeler',`pn=eq.${pn}`,'PATCH',{pn:yeniPn});
    // Yeni pn ile devam et
    pn=yeniPn;
    await loadAll();
  }

  const body={
    plan_uretim_baslangic:document.getElementById('pp_pbas').value||null,
    plan_uretim_bitis:document.getElementById('pp_pbit').value||null,
    termin:document.getElementById('pp_termin').value||null,
    genel_durum:document.getElementById('pp_gdurum').value||null
  };
  if(proj&&proj.akis_durumu==='PROJE KODU EKLENMELİ'){
    body.akis_durumu='ÜRETİM BAŞLANGIÇ BEKLİYOR';
  }
  try{await api('projeler',`pn=eq.${pn}`,'PATCH',body);await loadAll();openProjeModal(pn);}
  catch(e){alert('Hata: '+e.message);}
}

function openEkleKalem(pn){
  const kl=db.kalemler.filter(k=>k.pn===pn);
  const nextSira=kl.length+1;
  const hedef=document.getElementById('uretim_fields')||document.getElementById('kalem_ekle_wrap');
  if(!hedef) return;
  hedef.innerHTML=`
    <div class="kalem-box">
      <div class="kalem-head">Yeni Kalem — ${nextSira}. Kalem</div>
      <div class="frow">
        <div class="fg"><label>Açıklama *</label><input id="nk_aciklama" placeholder="Örn: 1. Flanş"></div>
        <div class="fg"><label>Tam / Kısmi</label><select id="nk_tamkismi"><option>Tam</option><option>Kısmi</option></select></div>
      </div>

        <button class="btn btn-primary" onclick="saveKalem('${pn}',${nextSira})">Kaydet</button>

function checkUretimBitis(){
  const v=document.getElementById('ur_dur')?.value;
  const el=document.getElementById('ur_bit');
  if(el) el.style.display=v==='Tamamlandı'?'':'none';
}

async function saveUretim(kid,pn){
  const durum=document.getElementById('ur_dur').value;
  const bitis=document.getElementById('ur_bit').value;
  const body={
    uretim_baslangic:document.getElementById('ur_bas').value||null,
    uretim_durumu:durum,
    uretim_bitis:durum==='Tamamlandı'?bitis||null:null
  };
  if(durum==='Tamamlandı') body.akis_durumu='QC BEKLİYOR';
  else if(durum==='Çalışılıyor') body.akis_durumu='ÜRETİM DEVAM EDİYOR';
  else if(durum==='Beklemede') body.akis_durumu='ÜRETİM BEKLEMEDE';

  // Proje durumunu güncelle
  const kl=db.kalemler.filter(k=>k.pn===pn);
  const tumTamamlandi=kl.every(k=>k.id===kid?durum==='Tamamlandı':k.uretim_durumu==='Tamamlandı');
  if(tumTamamlandi) await api('projeler',`pn=eq.${pn}`,'PATCH',{akis_durumu:'QC BEKLİYOR',genel_durum:'QC Bekliyor'});
  else if(durum==='Çalışılıyor') await api('projeler',`pn=eq.${pn}`,'PATCH',{akis_durumu:'ÜRETİM DEVAM EDİYOR',genel_durum:'Üretimde'});

  try{await api('kalemler',`id=eq.${kid}`,'PATCH',body);await loadAll();openProjeModal(pn);}
  catch(e){alert('Hata: '+e.message);}
}

async function ekleKismiKalem(pn){
  const kl=db.kalemler.filter(k=>k.pn===pn);
  const sel=document.getElementById('sel_uretim');
  const mevcutKalem=sel?db.kalemler.find(k=>k.id===sel.value):null;
  const nextSira=(mevcutKalem?mevcutKalem.kalem_sira:kl.length)+1;
  const aciklama=mevcutKalem?mevcutKalem.aciklama+' ('+nextSira+'. Kısmi)':'Yeni Kalem';
  try{
    await api('kalemler','','POST',{
      pn, kalem_sira:nextSira, aciklama,
      tam_kismi:'Kısmi', uretim_durumu:'Bekliyor', akis_durumu:'ÜRETİM BEKLİYOR'
    });
    await loadAll(); openProjeModal(pn);
  }catch(e){alert('Hata: '+e.message);}
}

async function saveSevkiyat(kid,pn){
  const sevktar=document.getElementById('sev_tarih').value;

  if(!teslim){alert('Teslim tarihi zorunludur.');return;}
  const k=db.kalemler.find(x=>x.id===kid);
  const isTam=k&&k.tam_kismi==='Tam';
  const body={sevk_tarihi:sevktar||null, teslim_tarihi:teslim, akis_durumu:isTam?'TAMAMLANDI':'KISMİ TESLİM'};

  if(isTam){
    const kl=db.kalemler.filter(x=>x.pn===pn);
    const tumTamamlandi=kl.every(x=>x.id===kid?true:x.akis_durumu==='TAMAMLANDI');
    if(tumTamamlandi) await api('projeler',`pn=eq.${pn}`,'PATCH',{akis_durumu:'TAMAMLANDI',genel_durum:'Tamamlandı'});

  try{await api('kalemler',`id=eq.${kid}`,'PATCH',body);await loadAll();openProjeModal(pn);}
  catch(e){alert('Hata: '+e.message);}
}

  db.teklifler.forEach(t=>{
    rows.push([t.tn,t.talep_tarihi,t.teknik_satis_muh,t.musteri_adi,t.fatura_adresi,t.musteri_yetkilisi,t.kategori,t.is_tanimi,t.teknik_sartname,t.teknik_sartname_tarihi,t.sevk_adresi,t.teklifi_hazirlayan,t.baslangic_tarihi,t.teklif_durum_uretim,t.onaya_sunulma_tarihi,t.ic_onay,t.ic_onay_yapan,t.ic_onay_tarihi,t.teklif_gonderme_tarihi,t.teklif_gecerlilik_tarihi,t.teklif_durumu_musteri,t.teklif_onay_tarihi_musteri,t.akis_durumu]);
  });
  downloadCSV(rows,'P2C_Teklifler_'+today()+'.csv');

function exportProjeler(){
  const rows=[['PN','TN','Müşteri','Kategori','İş Tanımı','Teknik Müh.','Teklif Onay Tarihi','Fatura Adresi','Sevk Adresi','Müşteri Yet.','Plan Başlangıç','Plan Bitiş','Termin','Genel Durum','Kalem No','Açıklama','Tam/Kısmi','Üretim Başlangıç','Üretim Durum','Üretim Bitiş','QC Rapor No','QC Tarihi','Fatura No','Fatura Tarihi','Sevk Tarihi','Teslim Tarihi','Kalem Durumu']];
  db.projeler.forEach(p=>{
    const kl=db.kalemler.filter(k=>k.pn===p.pn);
    if(kl.length===0){
      rows.push([p.pn,p.tn,p.musteri_adi,p.kategori,p.is_tanimi,p.teknik_satis_muh,p.teklif_onay_tarihi,p.fatura_adresi,p.sevk_adresi,p.musteri_yetkilisi,p.plan_uretim_baslangic,p.plan_uretim_bitis,p.termin,p.genel_durum,'','','','','','','','','','','','',p.akis_durumu]);
    } else {
      kl.forEach(k=>{
        rows.push([p.pn,p.tn,p.musteri_adi,p.kategori,p.is_tanimi,p.teknik_satis_muh,p.teklif_onay_tarihi,p.fatura_adresi,p.sevk_adresi,p.musteri_yetkilisi,p.plan_uretim_baslangic,p.plan_uretim_bitis,p.termin,p.genel_durum,k.kalem_sira,k.aciklama,k.tam_kismi,k.uretim_baslangic,k.uretim_durumu,k.uretim_bitis,k.qc_rapor_no,k.qc_tarihi,k.fatura_no,k.fatura_tarihi,k.sevk_tarihi,k.teslim_tarihi,k.akis_durumu]);
      });
    }
  });
  downloadCSV(rows,'P2C_Projeler_'+today()+'.csv');
}

function downloadCSV(rows,filename){
  const bom='\uFEFF';
  const csv=bom+rows.map(r=>r.map(v=>{
    const s=(v===null||v===undefined)?'':String(v);
    return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

/* ── MODAL HELPERS ── */
function setModal(html){document.getElementById('modalInner').innerHTML=html;document.getElementById('modalBg').classList.add('open');}
function closeM(){document.getElementById('modalBg').classList.remove('open');}
function closeMBg(e){if(e.target===document.getElementById('modalBg'))closeM();}
function switchMTab(btn,tabId){
  btn.closest('.modal').querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.modal').querySelectorAll('.mbody').forEach(d=>d.classList.remove('active'));
  const el=document.getElementById(tabId);
  if(el) el.classList.add('active');
}
