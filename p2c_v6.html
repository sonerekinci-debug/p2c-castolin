<style>
:root {
  --primary: #1a365d;

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter', sans-serif;font-size:13px;background:var(--bg);color:var(--text);line-height:1.5}

/* ── LOGIN ── */
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #1a365d 0%, #2d3748 100%);padding:20px}
.login-box{background:rgba(255, 255, 255, 0.95);backdrop-filter:blur(10px);border-radius:16px;box-shadow:0 20px 25px -5px rgba(0, 0, 0, 0.2);padding:40px;width:100%;max-width:400px;border:1px solid rgba(255, 255, 255, 0.2)}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo h1{font-size:24px;font-weight:800;color:var(--primary);letter-spacing:-0.02em}
.login-logo p{font-size:13px;color:var(--text-light);margin-top:6px;font-weight:500}
.lf{margin-bottom:18px}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--text-light);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.lf input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;transition:all 0.2s}
.lf input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26, 54, 93, 0.1)}
.login-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;transition:transform 0.1s, background 0.2s}
.login-btn:hover{background:var(--primary-light);transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-err{color:var(--secondary);font-size:12px;margin-top:12px;text-align:center;font-weight:600;min-height:18px}

/* ── APP ── */
#appWrap{display:none}
.topbar{display:flex;align-items:center;gap:15px;padding:0 20px;height:64px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
.topbar-logo-group {display:flex;align-items:center;gap:12px;flex:1}
.topbar-logo{font-size:16px;font-weight:800;color:var(--primary);letter-spacing:-0.02em}
.v-tag {background:var(--bg);color:var(--primary);font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.user-pill{font-size:12px;padding:6px 12px;border-radius:20px;font-weight:600;display:flex;align-items:center;gap:6px}
.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 10px}
.nb{padding:14px 20px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text-light);border-bottom:3px solid transparent;white-space:nowrap;font-weight:600;transition:all 0.2s}
.nb:hover{color:var(--primary);background:rgba(26, 54, 93, 0.02)}
.nb.active{color:var(--primary);border-bottom-color:var(--primary)}
.notif{display:inline-block;background:var(--secondary);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:6px;vertical-align:middle}
.content{padding:20px;background:var(--bg);min-height:calc(100vh - 110px)}

/* ── CARDS & TABLES ── */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);gap:10px;background:rgba(0,0,0,0.01)}
.card-title{font-size:14px;font-weight:700;color:var(--primary)}

.kpi-grid{display:grid;grid-template-columns:repeat(5, 1fr);gap:16px;margin-bottom:20px}
.kpi{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);transition:transform 0.2s}
.kpi:hover{transform:translateY(-2px)}
.kpi-lbl{font-size:11px;color:var(--text-light);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.kpi-val{font-size:26px;font-weight:800}

.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:12px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text-light);background:rgba(0,0,0,0.02);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:0.02em}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;transition:background 0.2s}
.tbl tr:hover td{background:rgba(26, 54, 93, 0.02);cursor:pointer}

/* ── BADGES ── */

.b-orange{background:#feebc8;color:#9c4221}
.b-teal{background:#b2f5ea;color:#234e52}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26, 54, 93, 0.4);backdrop-filter:blur(4px);z-index:300;overflow-y:auto;padding:20px}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center;animation:fadeIn 0.2s forwards}
@keyframes fadeIn {from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;width:100%;max-width:800px;box-shadow:0 25px 50px -12px rgba(0, 0, 0, 0.25);margin-top:20px;border:1px solid var(--border);overflow:hidden;animation:slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)}
@keyframes slideUp {from{transform:translateY(20px)}to{transform:translateY(0)}}
.modal-head{display:flex;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border);gap:12px;background:var(--bg)}
.modal-head h2{font-size:18px;font-weight:800;color:var(--primary);flex:1}

.mtabs{display:flex;background:var(--bg);padding:0 12px;border-bottom:1px solid var(--border)}
.mtab{padding:12px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text-light);border-bottom:3px solid transparent;font-weight:700;transition:all 0.2s}
.mtab.active{color:var(--primary);border-bottom-color:var(--primary)}
.mbody{padding:24px;display:none}
.mbody.active{display:block}

/* ── FORMS ── */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:18px}
.fg label{font-size:11px;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;display:block}
.fg input, .fg select, .fg textarea{font-size:14px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);width:100%;transition:all 0.2s}
.fg input:focus, .fg select:focus, .fg textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26, 54, 93, 0.1)}

.btn{font-size:13px;padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--text);font-weight:600;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{background:var(--bg);border-color:var(--text-light)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-danger{color:var(--secondary);border-color:var(--secondary)}
.btn-danger:hover{background:var(--secondary);color:#fff}

#toastWrap {position:fixed;bottom:30px;right:30px;z-index:9999;display:flex;flex-direction:column;gap:12px}
.toast {min-width:300px;padding:16px 20px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;box-shadow:0 10px 15px -3px rgba(0, 0, 0, 0.1);animation:t-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards}
@keyframes t-in {from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}

/* ── DEPARTMENT COLOR BANDS ── */
/* Group headers */
.gh { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; padding:6px 8px; text-align:center; border-bottom:2px solid transparent; }

<script>
const SB  = 'https://izbvahthrbwthsvboxox.supabase.co';
const KEY = 'sb_publishable_qkvvbA0Q89Sfv1PnQdhlPA_KIZr58Kx';


function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, function(m) {
    return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m];
  });
}

function showToast(msg, type='info') {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.3s';
    setTimeout(() => t.remove(), 300);
  }, 3000);
}

/* ── LİSTELER ── */
const KATEGORILER = ['CDP/CastoTube – Cut and or Fabricated Parts','Shop Welding & Brazing Applications','Site Welding Work','Shop Boiler/Vessel Coating incl. Tube Armour','Site Boiler/Vessel Coating incl. Tube Armour','Shop Coating Applications','Carrier Deck Coating','LaserClad Applications','VRM and Roller Press Work'];
const TEKLIF_DURUM_MUSTERI = ['DEĞERLENDİRMEDE','ONAYLANDI','OLUMSUZ - YÜKSEK FİYAT','OLUMSUZ - UZUN TERMİN','OLUMSUZ - TEKNİK EKSİKLİK(RESİM VS.)','OLUMSUZ - GARANTİ RİSK','OLUMSUZ - ÖDEME ŞARTLARI','OLUMSUZ - ONARIM YERİNE DEĞİŞİM'];
const TEKNIK_SARTNAME = ['Eklendi','Teknik resim eksik','Şartname eksik','Henüz yok'];
const IC_ONAY_SECENEKLER = ['Onaylandı','Reddedildi','Red-Fiyat düşük','Red- İş riskli'];
const URETIM_DURUM = ['Çalışılıyor','Müşteriden Bilgi Bekleniyor','Tamamlandı','Beklemede'];
const KALEM_URETIM_DURUM = ['Bekliyor','Çalışılıyor','Beklemede','Tamamlandı'];
const PROJE_GENEL_DURUM = ['Planlamada','Üretimde','QC Bekliyor','Kısmi Tamamlandı','Sevkiyatta','Tamamlandı'];
const SATISCILAR = ['Yiğit AYDOĞAN','Müslüm KAÇAR','Emrah ULUOCAK','Çağlar SAYAN','Tuğberk UZUN','Özgür Habib TUŞTAŞ','Cihan GÜRSES','Serhan KARABIYIKOĞLU','Soner EKİNCİ'];
const KONTROLCULAR = [...SATISCILAR,'Murat TUĞUT','Bertuğ SUNGUR','Ekin Can SAKARSU','Memet SALMAN'];
const TEKLIF_HAZIRLAYAN = ['Bertuğ SUNGUR','Ekin Can SAKARSU','Soner EKİNCİ'];

/* ── YETKI ── */
const DEPT_YETKİ = {
  'Genel Müdür':            {tam:true,  onay:true,  teklif:true,  tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Satış Direktörü':        {tam:false, onay:true,  teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Satış Destek':           {tam:true,  onay:true,  teklif:true,  tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Teknik Satış Mühendisi': {tam:false, onay:false, teklif:true,  tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Planlama':               {tam:false, onay:false, teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Üretim':                 {tam:false, onay:false, teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Kalite':                 {tam:true,  onay:false, teklif:true,  tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Muhasebe':               {tam:false, onay:false, teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
  'Sevkiyat':               {tam:false, onay:false, teklif:false, tabs:['satis','teknik','uretim','onay','planlama','qc','muhasebe','sevkiyat']},
};

/* Hangi departman hangi sekmeyi düzenleyebilir */
const EDIT_PERM = {
  satis:   ['Satış Destek','Genel Müdür','Kalite'],
  teknik:  ['Teknik Satış Mühendisi','Satış Destek','Genel Müdür','Kalite'],
  uretim:  ['Üretim','Satış Destek','Genel Müdür','Kalite'],
  onay:    ['Genel Müdür','Satış Direktörü','Satış Destek','Kalite'],
  planlama:['Planlama','Satış Destek','Genel Müdür','Kalite'],
  qc:      ['Kalite','Satış Destek','Genel Müdür'],
  muhasebe:['Muhasebe','Satış Destek','Genel Müdür','Kalite'],
  sevkiyat:['Sevkiyat','Satış Destek','Genel Müdür','Kalite'],
};

let me = null;
let db = {teklifler:[], projeler:[], kalemler:[]};
let currentTab = 'dashboard';
let authToken = null;

/* ── AUTH ── */
async function doLogin(){
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  if(!email||!pass){setErr('E-posta ve şifre giriniz.');return;}
  setErr('');
  try{
    const r = await fetch(`${SB}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'apikey':KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error_description||'Giriş başarısız');
    authToken = d.access_token;
    const pRes = await fetch(`${SB}/rest/v1/kullanici_profilleri?email=ilike.${encodeURIComponent(email)}&select=*`,{
      headers:{'apikey':KEY,'Authorization':'Bearer '+authToken}
    });
    const pData = await pRes.json();
    if(!pData.length) throw new Error('Kullanıcı profili bulunamadı.');
    me = pData[0];
    startApp();
  }catch(e){setErr(e.message);}
}

function setErr(m){document.getElementById('lErr').textContent=m;}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('lPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});

function doLogout(){
  me=null;authToken=null;
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('appWrap').style.display='none';
}

function startApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  const d=DEPT_YETKİ[me.departman]||{};
  const renk = {
    'Genel Müdür':'#E3F2FD','Satış Direktörü':'#E3F2FD','Satış Destek':'#E3F2FD',
    'Teknik Satış Mühendisi':'#E8EAF6','Planlama':'#F3E5F5','Üretim':'#FFF3E0',
    'Kalite':'#E8F5E9','Sevkiyat':'#E0F2F1','Muhasebe':'#EDE7F6'
  }[me.departman]||'#f5f5f5';
  const txtRenk = {
    'Genel Müdür':'#0C447C','Satış Direktörü':'#0C447C','Satış Destek':'#0C447C',
    'Teknik Satış Mühendisi':'#283593','Planlama':'#3C3489','Üretim':'#854F0B',
    'Kalite':'#1b5e20','Sevkiyat':'#004d40','Muhasebe':'#311b92'
  }[me.departman]||'#333';
  const pill = document.getElementById('userPill');
  pill.textContent=`${me.ad_soyad||me.email} — ${me.departman}`;
  pill.style.cssText=`background:${renk};color:${txtRenk};font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600`;
  loadAll();
}

/* ── API ── */
async function api(table,params='',method='GET',body=null){
  const h={'apikey':KEY,'Authorization':'Bearer '+(authToken||KEY),'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH') h['Prefer']='return=representation';
  const r=await fetch(`${SB}/rest/v1/${table}?${params}`,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok) throw new Error(await r.text());
  if(method==='DELETE') return true;
  const t=await r.text(); return t?JSON.parse(t):[];
}

async function loadAll(){
  setSS('Yükleniyor...');
  try{
    const [t,p,k]=await Promise.all([
      api('teklifler','select=*&order=created_at.desc'),
      api('projeler','select=*&order=created_at.desc'),
      api('kalemler','select=*&order=pn.asc,kalem_sira.asc')
    ]);
    db={teklifler:t,projeler:p,kalemler:k};
    setSS(''); buildNav(); renderTab(currentTab);
  }catch(e){setSS('Hata: '+e.message);}
}

function setSS(m){document.getElementById('ss').textContent=m;}

/* ── NAV ── */
const RAPOR_DEPT=['Genel Müdür','Kalite'];

function buildNav(){
  const d=DEPT_YETKİ[me.departman]||{};
  const onayCount=db.teklifler.filter(t=>t.akis_durumu==='ONAY BEKLİYOR').length;
  const tabs=[
    {id:'dashboard',label:'Dashboard'},
    {id:'teklifler',label:'Teklifler'},
    {id:'projeler',label:'Projeler'},
    {id:'onaylar',label:'Onaylar',notif:onayCount},
    ...(d.teklif?[{id:'yeni',label:'+ Yeni Teklif'}]:[]),
    ...(RAPOR_DEPT.includes(me.departman)?[{id:'raporlar',label:'Raporlar'}]:[])
  ];
  document.getElementById('mainNav').innerHTML=tabs.map(t=>
    `<button class="nb ${currentTab===t.id?'active':''}" onclick="showTab('${t.id}')">${t.label}${t.notif?`<span class="notif">${t.notif}</span>`:''}</button>`
  ).join('');
}

function showTab(tab){currentTab=tab;buildNav();renderTab(tab);}

function renderTab(tab){
  const c=document.getElementById('mainContent');
  if(tab==='dashboard') c.innerHTML=renderDashboard();
  else if(tab==='teklifler') c.innerHTML=renderTeklifler();
  else if(tab==='projeler') c.innerHTML=renderProjeler();
  else if(tab==='onaylar') c.innerHTML=renderOnaylar();
  else if(tab==='yeni') c.innerHTML=renderYeniTeklif();
  else if(tab==='raporlar') c.innerHTML=renderRaporlar();
}

/* ── HELPERS ── */
function canEdit(sekme){
  return (EDIT_PERM[sekme]||[]).includes(me.departman);
}
function sb(s){
  if(!s) return '<span class="badge b-gray">—</span>';
  if(['ONAYLANDI','Tamamlandı','Eklendi','Onaylandı'].includes(s)) return `<span class="badge b-green">${s}</span>`;
  if(['ONAY BEKLİYOR','DEĞERLENDİRMEDE','Çalışılıyor'].includes(s)) return `<span class="badge b-amber">${s}</span>`;
  if(s.startsWith('OLUMSUZ')||s==='Reddedildi') return `<span class="badge b-red">${s.length>20?s.substring(0,20)+'…':s}</span>`;
  if(['ÜRETİME SEVKEDİLDİ','Üretimde','QC BEKLİYOR','FATURA BEKLİYOR','SEVKİYAT BEKLİYOR'].includes(s)) return `<span class="badge b-blue">${s}</span>`;
  if(['PROJE KODU EKLENMELİ','TEKNİK ŞARTNAME BEKLİYOR','ÜRETİM BEKLİYOR'].includes(s)) return `<span class="badge b-orange">${s}</span>`;
  return `<span class="badge b-gray">${s}</span>`;
}
function catb(k){
  if(!k) return '<span class="badge b-gray">—</span>';
  const s=k.length>14?k.substring(0,14)+'…':k;
  if(k.includes('Cut')||k.includes('LaserClad')||k.includes('VRM')) return `<span class="badge b-blue" title="${k}">${s}</span>`;
  if(k.includes('Welding')||k.includes('Boiler')) return `<span class="badge b-amber" title="${k}">${s}</span>`;
  if(k.includes('Coating')||k.includes('Carrier')) return `<span class="badge b-teal" title="${k}">${s}</span>`;
  return `<span class="badge b-gray" title="${k}">${s}</span>`;
}
function opts(arr,sel='',blank=false){
  return (blank?'<option value="">—</option>':'')+arr.map(v=>`<option${v===sel?' selected':''}>${v}</option>`).join('');
}
function dis(edit){return edit?'':'disabled';}
function today(){return new Date().toISOString().split('T')[0];}
function daysDiff(d){if(!d)return null;const diff=Math.round((new Date(d)-new Date())/(1000*60*60*24));return diff;}

/* ── TEKLİFLER TABLOSU ── */
let teklifSortCol='', teklifSortAsc=true, teklifSearch='', teklifArsiv=false;
const TEKNIK_SATIS_DEPT='Teknik Satış Mühendisi';

const TEKLIF_ARSIV_DURUM=['OLUMSUZ','REDDEDİLDİ','ONAYLANDI'];

function renderTeklifler(){
  const d=DEPT_YETKİ[me.departman]||{};

  // Filtrele
  const isTeknikSatis=me.departman===TEKNIK_SATIS_DEPT;
  let liste=db.teklifler.filter(t=>{
    if(isTeknikSatis && t.teknik_satis_muh!==me.ad_soyad) return false;
    // Arşiv / Aktif ayrımı
    const arsivMi=TEKLIF_ARSIV_DURUM.includes(t.akis_durumu)||t.akis_durumu==='OLUMSUZ';
    if(teklifArsiv && !arsivMi) return false;
    if(!teklifArsiv && arsivMi) return false;
    if(teklifSearch){
      const s=teklifSearch.toLowerCase();
      return (t.tn||'').toLowerCase().includes(s)||
             (t.musteri_adi||'').toLowerCase().includes(s)||
             (t.kategori||'').toLowerCase().includes(s)||
             (t.akis_durumu||'').toLowerCase().includes(s)||
             (t.teknik_satis_muh||'').toLowerCase().includes(s);
    }
    return true;
  });

  // Varsayılan sıralama: olumsuz/kapananlar altta, gönderim tarihi yeniden eskiye
  const durumOncelik=(d)=>{
    if(['OLUMSUZ','REDDEDİLDİ'].includes(d)) return 99;
    if(d==='ONAYLANDI') return 50;
    return 1;
  };
  if(!teklifSortCol){
    liste.sort((a,b)=>{
      const dp=durumOncelik(a.akis_durumu)-durumOncelik(b.akis_durumu);
      if(dp!==0) return dp;
      const da=a.teklif_gonderme_tarihi||a.created_at||'';
      const db2=b.teklif_gonderme_tarihi||b.created_at||'';
      return db2.localeCompare(da);
    });
  } else {
    liste.sort((a,b)=>{
      const va=a[teklifSortCol]||'', vb=b[teklifSortCol]||'';
      return teklifSortAsc?va.localeCompare(vb):vb.localeCompare(va);
    });
  }

  function thSort(label,col,cls=''){
    const aktif=teklifSortCol===col;
    const ok=aktif?(teklifSortAsc?'▲':'▼'):'⇅';
    return `<th class="${cls}" style="cursor:pointer;user-select:none" onclick="sortTeklif('${col}')">${label} <span style="font-size:9px;color:${aktif?'#185FA5':'#bbb'}">${ok}</span></th>`;
  }

    <button class="btn ${teklifArsiv?'btn-primary':''}" onclick="teklifArsiv=!teklifArsiv;renderTab('teklifler')" style="${teklifArsiv?'':'color:#888'}">
      ${teklifArsiv?'← Aktif Teklifler':'Arşiv'}
    </button>
    <div style="font-size:12px;color:#888" id="teklifSayac">${liste.length} teklif${isTeknikSatis?' (sadece senin tekliflerin)':''}</div>
    ${d.teklif&&!teklifArsiv?'<button class="btn btn-primary" onclick="showTab(\'yeni\')">+ Yeni Teklif</button>':''}
    <button class="btn" style="margin-left:auto" onclick="exportTeklifler()">Excel İndir</button>
  </div>
  <div class="card" id="teklifTableWrap"><div class="tbl-wrap"><table class="tbl">
        <th class="gh gh-satis" colspan="2">SATIŞ DESTEK</th>
        <th class="gh gh-teknik" colspan="2">TEKNİK SATIŞ MÜH.</th>
        <th class="gh gh-uretim" colspan="3">ÜRETİM</th>
        <th class="gh gh-onay" colspan="2">ONAY</th>
        <th class="gh gh-satis" colspan="3">SATIŞ DESTEK — GÖNDERİM</th>
        <th>DURUM</th>
      </tr>
      <tr>
        <th>TN</th><th>Rev.</th><th>Tarih</th><th>Müşteri</th><th>Kategori</th>
        <th class="th-satis">Teknik Müh.</th><th class="th-satis">Müşteri Yet.</th>
        <th class="th-teknik">Teknik Şartname</th><th class="th-teknik">Şartname Tar.</th>
        <th class="th-uretim">Teklifi Hazırlayan</th><th class="th-uretim">Teklif Durumu</th><th class="th-uretim">Onaya Sunulma</th>
        <th class="th-onay">Onaylayan</th><th class="th-onay">Onay Tarihi</th>
        <th class="th-satis">Gönderim Tarihi</th><th class="th-satis">Geçerlilik</th><th class="th-satis">Müşteri Kararı</th>
        <th>Durum</th>
      </tr>
    </thead><tbody>`;

  if(!liste.length) html+=`<tr><td colspan="18" style="padding:20px;text-align:center;color:#aaa">Kayıt bulunamadı</td></tr>`;
  liste.forEach(t=>{
    html+=`<tr onclick="openTeklifModal('${t.id}')">

      <td><span class="badge b-gray">R${t.revizyon_no||0}</span></td>
      <td style="font-size:10px">${t.talep_tarihi||'—'}</td>
      <td style="font-weight:600">${esc(t.musteri_adi||'—')}</td>
      <td>${catb(t.kategori)}</td>
      <td>${esc(t.teknik_satis_muh||'—')}</td>
      <td>${esc(t.musteri_yetkilisi||'—')}</td>
      <td>${t.teknik_sartname==='Eklendi'?'<span class="badge b-green">Eklendi</span>':t.teknik_sartname?`<span class="badge b-amber">${t.teknik_sartname}</span>`:'<span class="badge b-gray">—</span>'}</td>

      <td>${sb(t.akis_durumu)}</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  return html;
}

function renderProjeTable(){
  const wrap=document.getElementById('projeTableWrap');
  if(!wrap){renderTab('projeler');return;}
  const isTeknikSatis=me.departman===TEKNIK_SATIS_DEPT;
  let liste=db.projeler.filter(p=>{
    if(isTeknikSatis && p.teknik_satis_muh!==me.ad_soyad) return false;
    const arsivMi=PROJE_ARSIV_DURUM.includes(p.akis_durumu);
    if(projeArsiv && !arsivMi) return false;
    if(!projeArsiv && arsivMi) return false;
    if(projeSearch){
      const s=projeSearch.toLowerCase();
      return (p.pn||'').toLowerCase().includes(s)||
             (p.tn||'').toLowerCase().includes(s)||
             (p.musteri_adi||'').toLowerCase().includes(s)||
             (p.kategori||'').toLowerCase().includes(s)||
             (p.akis_durumu||'').toLowerCase().includes(s)||
             (p.is_tanimi||'').toLowerCase().includes(s)||
             (p.is_emri_no||'').toLowerCase().includes(s)||
             (p.teknik_satis_muh||'').toLowerCase().includes(s);
    }
    return true;
  });
  const projeDurumOncelik=(d)=>{
    if(d==='TAMAMLANDI'||d==='KISMİ TESLİM') return 99;
    return 1;
  };
  if(!projeSortCol){
    liste.sort((a,b)=>{
      const dp=projeDurumOncelik(a.akis_durumu)-projeDurumOncelik(b.akis_durumu);
      if(dp!==0) return dp;
      const da=a.created_at||'', db2=b.created_at||'';
      return db2.localeCompare(da);
    });
  } else {
    liste.sort((a,b)=>{
      const va=a[projeSortCol]||'', vb=b[projeSortCol]||'';
      return projeSortAsc?va.localeCompare(vb):vb.localeCompare(va);
    });
  }
  let tbody='';
  if(!liste.length) tbody=`<tr><td colspan="24" style="padding:20px;text-align:center;color:#aaa">Kayıt bulunamadı</td></tr>`;
  liste.forEach(proj=>{
    const kl=db.kalemler.filter(k=>k.pn===proj.pn);
    const isLate=proj.termin&&new Date(proj.termin)<new Date()&&proj.akis_durumu!=='TAMAMLANDI';
    if(kl.length===0) tbody+=projeRow(proj,null,isLate,true);
    else kl.forEach((k,i)=>{tbody+=projeRow(proj,k,isLate,i===0);});
  });
  wrap.querySelector('tbody').innerHTML=tbody;
  const sayac=document.getElementById('projeSayac');
  if(sayac) sayac.textContent=`${liste.length} proje${isTeknikSatis?' (sadece senin projelerin)':''}`;
}

let projeSortCol='', projeSortAsc=true, projeSearch='', projeArsiv=false;

const PROJE_ARSIV_DURUM=['TAMAMLANDI','KISMİ TESLİM'];

function renderProjeler(){
  const isTeknikSatis=me.departman===TEKNIK_SATIS_DEPT;

  // Filtrele
  let liste=db.projeler.filter(p=>{
    if(isTeknikSatis && p.teknik_satis_muh!==me.ad_soyad) return false;
    const arsivMi=PROJE_ARSIV_DURUM.includes(p.akis_durumu);
    if(projeArsiv && !arsivMi) return false;
    if(!projeArsiv && arsivMi) return false;
    if(projeSearch){
      const s=projeSearch.toLowerCase();
      return (p.pn||'').toLowerCase().includes(s)||
             (p.tn||'').toLowerCase().includes(s)||
             (p.musteri_adi||'').toLowerCase().includes(s)||
             (p.kategori||'').toLowerCase().includes(s)||
             (p.akis_durumu||'').toLowerCase().includes(s)||
             (p.is_tanimi||'').toLowerCase().includes(s)||
             (p.is_emri_no||'').toLowerCase().includes(s)||
             (p.teknik_satis_muh||'').toLowerCase().includes(s);
    }
    return true;
  });

  // Varsayılan sıralama: tamamlananlar altta, devam edenler yeniden eskiye
  const projeDurumOncelik=(d)=>{
    if(d==='TAMAMLANDI'||d==='KISMİ TESLİM') return 99;
    return 1;
  };
  if(!projeSortCol){
    liste.sort((a,b)=>{
      const dp=projeDurumOncelik(a.akis_durumu)-projeDurumOncelik(b.akis_durumu);
      if(dp!==0) return dp;
      const da=a.created_at||'', db2=b.created_at||'';
      return db2.localeCompare(da);
    });
  } else {
    liste.sort((a,b)=>{
      const va=a[projeSortCol]||'', vb=b[projeSortCol]||'';
      return projeSortAsc?va.localeCompare(vb):vb.localeCompare(va);
    });
  }

  function thSort(label,col,cls=''){
    const aktif=projeSortCol===col;
    const ok=aktif?(projeSortAsc?'▲':'▼'):'⇅';
    return `<th class="${cls}" style="cursor:pointer;user-select:none" onclick="sortProje('${col}')">${label} <span style="font-size:9px;color:${aktif?'#185FA5':'#bbb'}">${ok}</span></th>`;
  }

  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <input id="projeSearchInput" placeholder="Ara: PN, TN, müşteri, kategori, durum..." value="${projeSearch}"
      oninput="projeSearch=this.value;renderProjeTable()"
      style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:260px">
    <button class="btn ${projeArsiv?'btn-primary':''}" onclick="projeArsiv=!projeArsiv;renderTab('projeler')" style="${projeArsiv?'':'color:#888'}">
      ${projeArsiv?'← Aktif Projeler':'Arşiv'}
    </button>
    <div style="font-size:12px;color:#888" id="projeSayac">${liste.length} proje${isTeknikSatis?' (sadece senin projelerin)':''}</div>
    <button class="btn" style="margin-left:auto" onclick="exportProjeler()">Excel İndir</button>
  </div>
  <div class="card" id="projeTableWrap"><div class="tbl-wrap"><table class="tbl">
    <thead>
      <tr>
        <th colspan="10" class="gh gh-satis">TEKLİF (OTOMATİK GELİR)</th>
        <th class="gh gh-planlama" colspan="4">PLANLAMA</th>
        <th class="gh gh-uretim" colspan="3">ÜRETİM</th>
        <th class="gh gh-qc" colspan="2">QC</th>
        <th class="gh gh-muhasebe" colspan="2">MUHASEBE</th>
        <th class="gh gh-sevkiyat" colspan="2">SEVKİYAT</th>
        <th>DURUM</th>
      </tr>
      <tr>
        ${thSort('PN','pn')}<th>TN</th><th>Onay Tar.</th><th>Teknik Müh.</th><th>Müşteri</th><th>Fatura Adr.</th><th>Sevk Adr.</th><th>Müşteri Yet.</th><th>Kategori</th><th>İş Tanımı</th>
        <th class="th-planlama">Plan Baş.</th><th class="th-planlama">Plan Bitiş</th><th class="th-planlama">Termin</th>
        <th class="th-uretim">İş Emri No</th><th class="th-uretim">Kalem</th><th class="th-uretim">Tam/Kısmi</th><th class="th-uretim">Üretim Durum</th>
        <th class="th-qc">QC Rapor No</th><th class="th-qc">QC Tarihi</th>
        <th class="th-muhasebe">Fatura No</th><th class="th-muhasebe">Fatura Tar.</th>
        <th class="th-sevkiyat">Sevk Tar.</th><th class="th-sevkiyat">Teslim Tar.</th>
        <th>Durum</th>
      </tr>
    </thead><tbody>`;

  if(!liste.length) html+=`<tr><td colspan="24" style="padding:20px;text-align:center;color:#aaa">Kayıt bulunamadı</td></tr>`;

  liste.forEach(proj=>{
    const kl=db.kalemler.filter(k=>k.pn===proj.pn);
    const isLate=proj.termin&&new Date(proj.termin)<new Date()&&proj.akis_durumu!=='TAMAMLANDI';
    if(kl.length===0){
      html+=projeRow(proj,null,isLate,true);
    } else {
      kl.forEach((k,i)=>{html+=projeRow(proj,k,isLate,i===0);});
    }
  });
  html+=`</tbody></table></div></div>`;
  return html;
}

function sortTeklif(col){
  if(teklifSortCol===col) teklifSortAsc=!teklifSortAsc;
  else{teklifSortCol=col;teklifSortAsc=true;}

}

function sortProje(col){
  if(projeSortCol===col) projeSortAsc=!projeSortAsc;
  else{projeSortCol=col;projeSortAsc=true;}
  renderProjeTable();
}

async function saveOnay(id){
  const ad=document.getElementById('oa_ad').value.trim();
  if(!ad){alert('Ad soyad zorunludur.');return;}
  const karar=document.getElementById('oa_karar').value;
  const tarih=document.getElementById('oa_tarih').value;
  const onaylandi=karar==='Onaylandı';
  try{
    await api('teklifler',`id=eq.${id}`,'PATCH',{
      ic_onay:karar, ic_onay_yapan:ad, ic_onay_tarihi:tarih,
      akis_durumu:onaylandi?'MÜŞTERİYE GÖNDERİLMEYİ BEKLİYOR':'REDDEDİLDİ'
    });
    closeM(); await loadAll();
  }catch(e){showToast('Hata: '+e.message, 'error');}
}

function checkTN(val){
  const warn=document.getElementById('yt_tn_warn');
  if(warn) warn.style.display=db.teklifler.find(t=>t.tn===val.trim())?'block':'none';
}

async function saveTeklif(){
  const tn=document.getElementById('yt_tn').value.trim();
  const musteri=document.getElementById('yt_musteri').value.trim();
  const kategori=document.getElementById('yt_kategori').value;
  const tanim=document.getElementById('yt_tanim').value.trim();
  if(!tn||!musteri||!kategori||!tanim){alert('TN, müşteri, kategori ve iş tanımı zorunludur.');return;}

  // Revizyon no hesapla
  const mevcutlar=db.teklifler.filter(t=>t.tn===tn);
  const revizyon_no=mevcutlar.length>0?Math.max(...mevcutlar.map(t=>t.revizyon_no||0))+1:0;

  // Mevcut TN varsa verilerini kopyala
  const onceki=mevcutlar.length>0?mevcutlar[mevcutlar.length-1]:null;

  try{
    await api('teklifler','','POST',{
      tn,
      revizyon_no,
      talep_tarihi:document.getElementById('yt_tarih').value,
      teknik_satis_muh:document.getElementById('yt_muh').value||onceki?.teknik_satis_muh||null,
      musteri_adi:musteri,
      musteri_yetkilisi:document.getElementById('yt_yetkili').value||onceki?.musteri_yetkilisi||null,
      fatura_adresi:document.getElementById('yt_fadres').value||onceki?.fatura_adresi||null,
      sevk_adresi:onceki?.sevk_adresi||null,
      kategori,
      is_tanimi:tanim,
      akis_durumu:'TEKNİK ŞARTNAME BEKLİYOR'
    });
    buildNav(); renderTab(currentTab); showTab('teklifler');
  }catch(e){showToast('Hata: '+e.message, 'error');}
}

function toggleSevkAdresi(checked){
  const el=document.getElementById('tt_sevkadres');
  if(!el) return;
  el.disabled=checked;
  el.style.background=checked?'#f9f9f7':'';
  el.style.color=checked?'#aaa':'';
  if(checked) el.value='';
}

function checkUretimTamamlandi(){
  const v=document.getElementById('tu_durum')?.value;
  const el=document.getElementById('tu_onaytar');
  if(el) el.style.display=v==='Tamamlandı'?'':'none';
}
function checkMusteriKarar(){
  const v=document.getElementById('tg_karar')?.value;
  const el=document.getElementById('tg_onaytar');
  if(el) el.style.display=v==='ONAYLANDI'?'':'none';
}

async function saveTeklifSatis(id){
  try{
    await api('teklifler',`id=eq.${id}`,'PATCH',{
      talep_tarihi:document.getElementById('ts_tarih').value||null,
      musteri_adi:document.getElementById('ts_musteri').value,
      musteri_yetkilisi:document.getElementById('ts_yetkili').value,
      fatura_adresi:document.getElementById('ts_fadres').value,
      teknik_satis_muh:document.getElementById('ts_muh').value,
      kategori:document.getElementById('ts_kategori').value,
      is_tanimi:document.getElementById('ts_tanim').value
    });
    await loadAll(); closeM();
  }catch(e){showToast('Hata: '+e.message, 'error');}
}

async function saveTeklifTeknik(id){
  const sartname=document.getElementById('tt_sartname').value;
  const musteriyeAit=document.getElementById('tt_musteriye')?.checked||false;
  const body={
    teknik_sartname:sartname,
    teknik_sartname_tarihi:document.getElementById('tt_sarttarih').value||null,
    sevk_adresi:musteriyeAit?null:document.getElementById('tt_sevkadres').value,
    sevkiyat_musteriye_ait:musteriyeAit
  };
  const t=db.teklifler.find(x=>x.id===id);
  if(sartname==='Eklendi'&&t&&t.akis_durumu==='TEKNİK ŞARTNAME BEKLİYOR'){
    body.akis_durumu='ÜRETİME SEVKEDİLDİ';
  }
  try{await api('teklifler',`id=eq.${id}`,'PATCH',body);buildNav(); renderTab(currentTab); closeM();}
  catch(e){showToast('Hata: '+e.message, 'error');}
}

async function saveTeklifUretim(id){
  const durum=document.getElementById('tu_durum').value;
  const onaytar=document.getElementById('tu_onaytar').value;
  const body={
    teklifi_hazirlayan:document.getElementById('tu_hazirlayan').value||null,
    baslangic_tarihi:document.getElementById('tu_bastarih').value||null,
    teklif_durum_uretim:durum,
    onaya_sunulma_tarihi:durum==='Tamamlandı'?onaytar||null:null
  };
  if(durum==='Tamamlandı'&&onaytar) body.akis_durumu='ONAY BEKLİYOR';
  try{await api('teklifler',`id=eq.${id}`,'PATCH',body);buildNav(); renderTab(currentTab); closeM();}
  catch(e){showToast('Hata: '+e.message, 'error');}
}

async function saveTeklifOnay(id,karar){
  const ad=document.getElementById('to_ad').value.trim();
  if(!ad){alert('Ad soyad zorunludur.');return;}
  const onaylandi=karar==='Onaylandı';
  try{
    await api('teklifler',`id=eq.${id}`,'PATCH',{
      ic_onay:karar, ic_onay_yapan:ad,
      ic_onay_tarihi:document.getElementById('to_tarih').value||today(),
      akis_durumu:onaylandi?'MÜŞTERİYE GÖNDERİLMEYİ BEKLİYOR':'REDDEDİLDİ'
    });
    await loadAll(); closeM();
  }catch(e){showToast('Hata: '+e.message, 'error');}
}

async function saveTeklifGonderim(id){
  const gtar=document.getElementById('tg_gtar').value;
  const gec=document.getElementById('tg_gec').value;
  if(gtar&&gec&&gec<gtar){alert('Teklif geçerlilik tarihi gönderim tarihinden önce olamaz!');return;}
  const karar=document.getElementById('tg_karar').value;
  const onaylandi=karar==='ONAYLANDI';
  const body={
    teklif_gonderme_tarihi:document.getElementById('tg_gtar').value||null,
    teklif_gecerlilik_tarihi:document.getElementById('tg_gec').value||null,
    teklif_durumu_musteri:karar,
    teklif_onay_tarihi_musteri:onaylandi?document.getElementById('tg_onaytar').value||null:null
  };
  if(onaylandi) body.akis_durumu='ONAYLANDI';
  else if(karar.startsWith('OLUMSUZ')) body.akis_durumu='OLUMSUZ';
  try{await api('teklifler',`id=eq.${id}`,'PATCH',body);buildNav(); renderTab(currentTab); closeM();}
  catch(e){showToast('Hata: '+e.message, 'error');}
}

async function tekliftenProje(id){
  const t=db.teklifler.find(x=>x.id===id);
  if(!t) return;
  // Geçici PN — revizyon no ile benzersiz
  const geciciPn='BEKLIYOR-'+t.tn.replace(/\./g,'')+'-R'+(t.revizyon_no||0);
  if(db.projeler.find(p=>p.pn===geciciPn)){
    alert('Bu revizyondan zaten proje oluşturulmuş: '+geciciPn);return;
  }
  try{
    await api('projeler','','POST',{
      pn:geciciPn, tn:t.tn,
      teklif_onay_tarihi:t.teklif_onay_tarihi_musteri,
      teknik_satis_muh:t.teknik_satis_muh,
      musteri_adi:t.musteri_adi,
      fatura_adresi:t.fatura_adresi,
      sevk_adresi:t.sevk_adresi,
      musteri_yetkilisi:t.musteri_yetkilisi,
      kategori:t.kategori,
      is_tanimi:t.is_tanimi,
      akis_durumu:'PROJE KODU EKLENMELİ'
    });
    closeM(); buildNav(); renderTab(currentTab); showTab('projeler'); openProjeModal(geciciPn);
  }catch(e){showToast('Hata: '+e.message, 'error');}
}

async function saveIsEmri(pn){

    await api('projeler',`pn=eq.${pn}`,'PATCH',{is_emri_no:no||null});
    await loadAll(); openProjeModal(pn);
  }catch(e){showToast('Hata: '+e.message, 'error');}
}


async function savePlanlama(pn){
  const yeniPn=document.getElementById('pp_pn').value.trim();
  if(!yeniPn){alert('Proje No zorunludur.');return;}

  // PN değiştiyse önce güncelle
  const proj=db.projeler.find(x=>x.pn===pn);
  if(yeniPn!==pn){
    if(db.projeler.find(p=>p.pn===yeniPn)){alert('Bu PN zaten mevcut!');return;}
    // Kalemler tablosunu da güncelle
    await api('kalemler',`pn=eq.${pn}`,'PATCH',{pn:yeniPn});
    await api('projeler',`pn=eq.${pn}`,'PATCH',{pn:yeniPn});
    // Yeni pn ile devam et
    pn=yeniPn;
    await loadAll();
  }

  const bas=document.getElementById('pp_pbas').value;
  const bit=document.getElementById('pp_pbit').value;
  if(bas&&bit&&bit<bas){alert('Planlanan üretim bitiş tarihi başlangıçtan önce olamaz!');return;}

  const body={
    plan_uretim_baslangic:bas||null,
    plan_uretim_bitis:bit||null,
    termin:document.getElementById('pp_termin').value||null,
    planlama_notu:document.getElementById('pp_not').value.trim()||null
  };

async function saveUretim(kid,pn){
  const proj=db.projeler.find(p=>p.pn===pn);
  if(!proj?.plan_uretim_baslangic||!proj?.plan_uretim_bitis){
    alert('Önce Planlama sekmesinden üretim başlangıç ve bitiş tarihlerini girmelisiniz!');
    return;
  }
  const durum=document.getElementById('ur_dur').value;
  const bas=document.getElementById('ur_bas').value;
  const bitis=document.getElementById('ur_bit').value;
  if(bas&&bitis&&bitis<bas){alert('Üretim bitiş tarihi başlangıç tarihinden önce olamaz!');return;}
  const body={
    uretim_baslangic:bas||null,
    uretim_durumu:durum,
    uretim_bitis:durum==='Tamamlandı'?bitis||null:null
  };
  if(durum==='Tamamlandı') body.akis_durumu='QC BEKLİYOR';
  else if(durum==='Çalışılıyor') body.akis_durumu='ÜRETİM DEVAM EDİYOR';
  else if(durum==='Beklemede') body.akis_durumu='ÜRETİM BEKLEMEDE';
  else body.akis_durumu='ÜRETİM BEKLİYOR';

  // Kalem kaydı yapıldıktan SONRA proje durumunu tüm kalemlere göre hesapla
  try{
    await api('kalemler',`id=eq.${kid}`,'PATCH',body);
    await loadAll();
    // Güncel kalem listesi
    const kl=db.kalemler.filter(k=>k.pn===pn);
    let projDurum, genelDurum;
    if(kl.every(k=>k.akis_durumu==='TAMAMLANDI')){
      projDurum='TAMAMLANDI'; genelDurum='Tamamlandı';
    } else if(kl.every(k=>['TAMAMLANDI','KISMİ TESLİM'].includes(k.akis_durumu))){
      projDurum='KISMİ TESLİM'; genelDurum='Kısmi Tamamlandı';
    } else if(kl.some(k=>k.akis_durumu==='SEVKİYATTA')){
      projDurum='SEVKİYATTA'; genelDurum='Sevkiyatta';
    } else if(kl.some(k=>k.akis_durumu==='SEVKİYAT BEKLİYOR')){
      projDurum='SEVKİYAT BEKLİYOR'; genelDurum='Sevkiyatta';
    } else if(kl.every(k=>['QC BEKLİYOR','FATURA BEKLİYOR','SEVKİYAT BEKLİYOR','SEVKİYATTA','TAMAMLANDI','KISMİ TESLİM'].includes(k.akis_durumu))){
      // Tüm kalemler üretim sonrasına geçmiş — ama hepsi tamamlanmamışsa
      if(kl.some(k=>k.akis_durumu==='FATURA BEKLİYOR')){ projDurum='FATURA BEKLİYOR'; genelDurum='Fatura Bekliyor'; }
      else { projDurum='QC BEKLİYOR'; genelDurum='QC Bekliyor'; }
    } else if(kl.some(k=>k.uretim_durumu==='Çalışılıyor')){
      projDurum='ÜRETİM DEVAM EDİYOR'; genelDurum='Üretimde';
    } else if(kl.some(k=>k.uretim_durumu==='Beklemede')){
      projDurum='ÜRETİM BEKLEMEDE'; genelDurum='Beklemede';
    } else {
      projDurum='ÜRETİM BAŞLANGIÇ BEKLİYOR'; genelDurum='Üretim Bekliyor';
    }
    await api('projeler',`pn=eq.${pn}`,'PATCH',{akis_durumu:projDurum,genel_durum:genelDurum});
    await loadAll();
    openProjeModal(pn);
  }catch(e){showToast('Hata: '+e.message, 'error');}
}

  const body={sevk_tarihi:sevktar, teslim_tarihi:teslim||null, akis_durumu:yeniDurum, sevkiyat_bilgisi:document.getElementById('sev_bilgi')?.value||null};

  if(teslim){
    const kl=db.kalemler.filter(x=>x.pn===pn);
    const tumTamamlandi=kl.every(x=>x.id===kid?true:['TAMAMLANDI','KISMİ TESLİM'].includes(x.akis_durumu));

      await api('projeler',`pn=eq.${pn}`,'PATCH',{akis_durumu:'TAMAMLANDI',genel_durum:'Tamamlandı'});

    await api('projeler',`pn=eq.${pn}`,'PATCH',{akis_durumu:'SEVKİYATTA',genel_durum:'Sevkiyatta'});

  try{await api('kalemler',`id=eq.${kid}`,'PATCH',body);await loadAll();openProjeModal(pn);}

let raporBasTar='', raporBitTar='';

function renderRaporlar(){
  if(!RAPOR_DEPT.includes(me.departman)) return `<div class="card"><div style="padding:24px;text-align:center;color:#aaa">Bu sayfaya erişim yetkiniz yok.</div></div>`;

  // Tarih filtresi
  const filtrele=(tarih)=>{
    if(!tarih) return true;
    if(raporBasTar && tarih < raporBasTar) return false;
    if(raporBitTar && tarih > raporBitTar) return false;
    return true;
  };

  const t=db.teklifler.filter(x=>filtrele(x.talep_tarihi));
  const p=db.projeler.filter(x=>filtrele(x.teklif_onay_tarihi||x.created_at?.substring(0,10)));

  // Satışçı listesi
  const satiscilar=[...new Set(t.map(x=>x.teknik_satis_muh).filter(Boolean))].sort();

  // Satışçı bazında KPI
  const satisKPI=satiscilar.map(s=>{
    const liste=t.filter(x=>x.teknik_satis_muh===s);
    const toplam=liste.length;
    const onaylandi=liste.filter(x=>x.teklif_durumu_musteri==='ONAYLANDI').length;
    const olumsuz=liste.filter(x=>(x.teklif_durumu_musteri||'').startsWith('OLUMSUZ')||x.akis_durumu==='REDDEDİLDİ').length;
    const beklemede=liste.filter(x=>x.teklif_durumu_musteri==='DEĞERLENDİRMEDE'||!x.teklif_durumu_musteri).length;
    const oran=toplam>0?Math.round(onaylandi/toplam*100):0;
    return {s,toplam,onaylandi,olumsuz,beklemede,oran};
  });

  // Kategori bazında dağılım
  const kategoriler=[...new Set(t.map(x=>x.kategori).filter(Boolean))].sort();
  const katKPI=kategoriler.map(k=>{
    const liste=t.filter(x=>x.kategori===k);
    const onaylandi=liste.filter(x=>x.teklif_durumu_musteri==='ONAYLANDI').length;
    return {k,toplam:liste.length,onaylandi};
  }).sort((a,b)=>b.toplam-a.toplam);

  // Üretim KPI
  const uretimSureler=t.filter(x=>x.baslangic_tarihi&&x.onaya_sunulma_tarihi).map(x=>{
    const gun=Math.round((new Date(x.onaya_sunulma_tarihi)-new Date(x.baslangic_tarihi))/(1000*60*60*24));
    return {tn:x.tn,musteri:x.musteri_adi,hazirlayan:x.teklifi_hazirlayan,gun,hiz:gun<=3?'hizli':gun<=7?'orta':'yavas'};
  });
  const hizli=uretimSureler.filter(x=>x.hiz==='hizli').length;
  const orta=uretimSureler.filter(x=>x.hiz==='orta').length;
  const yavas=uretimSureler.filter(x=>x.hiz==='yavas').length;
  const toplam_sure=uretimSureler.length;

  const tamamlananProje=p.filter(x=>x.akis_durumu==='TAMAMLANDI'||x.akis_durumu==='KISMİ TESLİM').length;
  const devamEdenProje=p.filter(x=>x.akis_durumu!=='TAMAMLANDI'&&x.akis_durumu!=='KISMİ TESLİM').length;

  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <div style="font-size:13px;font-weight:700;color:#1565C0">Raporlar — KPI Özeti</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="fg" style="margin:0">
        <label style="font-size:10px;color:#888;font-weight:700;text-transform:uppercase">Başlangıç</label>
        <input type="date" value="${raporBasTar}" onchange="raporBasTar=this.value;renderTab('raporlar')"
          style="font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px">
      </div>
      <div class="fg" style="margin:0">
        <label style="font-size:10px;color:#888;font-weight:700;text-transform:uppercase">Bitiş</label>
        <input type="date" value="${raporBitTar}" onchange="raporBitTar=this.value;renderTab('raporlar')"
          style="font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px">
      </div>
      ${raporBasTar||raporBitTar?`<button class="btn btn-sm" onclick="raporBasTar='';raporBitTar='';renderTab('raporlar')" style="margin-top:16px">Temizle</button>`:''}
    </div>
  </div>
  ${raporBasTar||raporBitTar?`<div class="alert-warn" style="margin-bottom:12px">
    Filtre: ${raporBasTar||'Baştan'} — ${raporBitTar||'Bugüne'} &nbsp;|&nbsp; ${t.length} teklif, ${p.length} proje
  </div>`:''}`;

  // Üst KPI
  html+=`<div class="kpi-grid" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:14px">
    <div class="kpi"><div class="kpi-lbl">Toplam teklif</div><div class="kpi-val kv-blue">${t.length}</div></div>
    <div class="kpi"><div class="kpi-lbl">Onaylanan teklif</div><div class="kpi-val kv-green">${t.filter(x=>x.teklif_durumu_musteri==='ONAYLANDI').length}</div></div>
    <div class="kpi"><div class="kpi-lbl">Tamamlanan proje</div><div class="kpi-val kv-green">${tamamlananProje}</div></div>
    <div class="kpi"><div class="kpi-lbl">Devam eden proje</div><div class="kpi-val kv-blue">${devamEdenProje}</div></div>
  </div>`;

  // Satışçı KPI
  html+=`<div class="card" style="margin-bottom:14px">
    <div class="card-head"><div class="card-title">Satışçı Performansı</div></div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr>
        <th>Teknik Satış Müh.</th>
        <th class="gh gh-satis">Toplam</th>
        <th class="gh gh-qc">Onaylanan</th>
        <th class="gh gh-onay">Olumsuz</th>
        <th class="gh gh-uretim">Beklemede</th>
        <th>Onay Oranı</th>
      </tr></thead><tbody>`;

  satisKPI.sort((a,b)=>b.onaylandi-a.onaylandi).forEach(r=>{
    html+=`<tr>
      <td style="font-weight:600">${esc(r.s)}</td>
      <td style="text-align:center;font-weight:700;color:#185FA5">${r.toplam}</td>
      <td style="text-align:center;font-weight:700;color:#2d7a2d">${r.onaylandi}</td>
      <td style="text-align:center;font-weight:700;color:#a32d2d">${r.olumsuz}</td>
      <td style="text-align:center;color:#888">${r.beklemede}</td>
      <td style="min-width:120px">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden">
            <div style="width:${r.oran}%;height:100%;background:${r.oran>=50?'#2d7a2d':'#E65100'};border-radius:3px"></div>
          </div>
          <span style="font-size:11px;font-weight:700;color:${r.oran>=50?'#2d7a2d':'#E65100'}">${r.oran}%</span>
        </div>
      </td>
    </tr>`;
  });
  if(!satisKPI.length) html+=`<tr><td colspan="6" style="padding:16px;text-align:center;color:#aaa">Veri yok</td></tr>`;
  html+=`</tbody></table></div></div>`;

  // Kategori dağılımı
  html+=`<div class="card" style="margin-bottom:14px">
    <div class="card-head"><div class="card-title">Kategori Bazında Teklif Dağılımı</div></div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Kategori</th><th>Toplam</th><th>Onaylanan</th><th>Onay Oranı</th></tr></thead><tbody>`;

  katKPI.forEach(r=>{
    const oran=r.toplam>0?Math.round(r.onaylandi/r.toplam*100):0;
    html+=`<tr>
      <td>${catb(r.k)}</td>
      <td style="font-weight:700;color:#185FA5">${r.toplam}</td>
      <td style="font-weight:700;color:#2d7a2d">${r.onaylandi}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:80px;height:6px;background:#eee;border-radius:3px;overflow:hidden">
            <div style="width:${oran}%;height:100%;background:${oran>=50?'#2d7a2d':'#E65100'};border-radius:3px"></div>
          </div>
          <span style="font-size:11px;font-weight:700">${oran}%</span>
        </div>
      </td>
    </tr>`;
  });
  if(!katKPI.length) html+=`<tr><td colspan="4" style="padding:16px;text-align:center;color:#aaa">Veri yok</td></tr>`;
  html+=`</tbody></table></div></div>`;

  // Üretim KPI
  html+=`<div class="card" style="margin-bottom:14px">
    <div class="card-head"><div class="card-title" style="color:#E65100">Üretim KPI — Teklif Hazırlama Süresi</div>
      <span class="badge b-gray">${toplam_sure} teklif ölçüldü</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px 14px;border-bottom:1px solid #f0f0f0">
      <div style="text-align:center">
        <div style="font-size:11px;color:#888;margin-bottom:4px">≤ 3 gün (Hızlı)</div>
        <div style="font-size:28px;font-weight:700;color:#2d7a2d">${hizli}</div>
        <div style="font-size:11px;color:#888">${toplam_sure>0?Math.round(hizli/toplam_sure*100):0}%</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:11px;color:#888;margin-bottom:4px">4-7 gün (Orta)</div>
        <div style="font-size:28px;font-weight:700;color:#b06000">${orta}</div>
        <div style="font-size:11px;color:#888">${toplam_sure>0?Math.round(orta/toplam_sure*100):0}%</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:11px;color:#888;margin-bottom:4px">> 7 gün (Yavaş)</div>
        <div style="font-size:28px;font-weight:700;color:#a32d2d">${yavas}</div>
        <div style="font-size:11px;color:#888">${toplam_sure>0?Math.round(yavas/toplam_sure*100):0}%</div>
      </div>
    </div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>TN</th><th>Müşteri</th><th>Hazırlayan</th><th>Süre</th><th>Değerlendirme</th></tr></thead>
      <tbody>`;

  uretimSureler.sort((a,b)=>a.gun-b.gun).forEach(r=>{
    const renk=r.hiz==='hizli'?'b-green':r.hiz==='orta'?'b-amber':'b-red';
    const lbl=r.hiz==='hizli'?'Hızlı':r.hiz==='orta'?'Orta':'Yavaş';
    html+=`<tr>
      <td style="font-weight:700;color:#185FA5">${esc(r.tn)}</td>
      <td>${esc(r.musteri||'—')}</td>
      <td>${esc(r.hazirlayan||'—')}</td>
      <td style="font-weight:700">${r.gun} gün</td>
      <td><span class="badge ${renk}">${lbl}</span></td>
    </tr>`;
  });
  if(!uretimSureler.length) html+=`<tr><td colspan="5" style="padding:16px;text-align:center;color:#aaa">Henüz ölçülebilir veri yok</td></tr>`;
  html+=`</tbody></table></div></div>`;

  return html;
}

/* ── EXCEL EXPORT ── */

  db.teklifler.forEach(t=>{
    rows.push([t.tn,t.talep_tarihi,t.teknik_satis_muh,t.musteri_adi,t.fatura_adresi,t.musteri_yetkilisi,t.kategori,t.is_tanimi,t.teknik_sartname,t.teknik_sartname_tarihi,t.sevk_adresi,t.teklifi_hazirlayan,t.baslangic_tarihi,t.teklif_durum_uretim,t.onaya_sunulma_tarihi,t.ic_onay,t.ic_onay_yapan,t.ic_onay_tarihi,t.teklif_gonderme_tarihi,t.teklif_gecerlilik_tarihi,t.teklif_durumu_musteri,t.teklif_onay_tarihi_musteri,t.akis_durumu]);
  });
  downloadCSV(rows,'P2C_Teklifler_'+today()+'.csv');
}

function exportProjeler(){
  const rows=[['PN','TN','Müşteri','Kategori','İş Tanımı','Teknik Müh.','Teklif Onay Tarihi','Fatura Adresi','Sevk Adresi','Müşteri Yet.','Plan Başlangıç','Plan Bitiş','Termin','Genel Durum','Kalem No','Açıklama','Tam/Kısmi','Üretim Başlangıç','Üretim Durum','Üretim Bitiş','QC Rapor No','QC Tarihi','Fatura No','Fatura Tarihi','Sevk Tarihi','Teslim Tarihi','Kalem Durumu']];
  db.projeler.forEach(p=>{
    const kl=db.kalemler.filter(k=>k.pn===p.pn);
    if(kl.length===0){
      rows.push([p.pn,p.tn,p.musteri_adi,p.kategori,p.is_tanimi,p.teknik_satis_muh,p.teklif_onay_tarihi,p.fatura_adresi,p.sevk_adresi,p.musteri_yetkilisi,p.plan_uretim_baslangic,p.plan_uretim_bitis,p.termin,p.genel_durum,'','','','','','','','','','','','',p.akis_durumu]);
    } else {
      kl.forEach(k=>{
        rows.push([p.pn,p.tn,p.musteri_adi,p.kategori,p.is_tanimi,p.teknik_satis_muh,p.teklif_onay_tarihi,p.fatura_adresi,p.sevk_adresi,p.musteri_yetkilisi,p.plan_uretim_baslangic,p.plan_uretim_bitis,p.termin,p.genel_durum,k.kalem_sira,k.aciklama,k.tam_kismi,k.uretim_baslangic,k.uretim_durumu,k.uretim_bitis,k.qc_rapor_no,k.qc_tarihi,k.fatura_no,k.fatura_tarihi,k.sevk_tarihi,k.teslim_tarihi,k.akis_durumu]);
      });
    }
  });
  downloadCSV(rows,'P2C_Projeler_'+today()+'.csv');
}

function downloadCSV(rows,filename){
  const bom='\uFEFF';
  const csv=bom+rows.map(r=>r.map(v=>{
    const s=(v===null||v===undefined)?'':String(v);
    return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

/* ── MODAL HELPERS ── */
function setModal(html){document.getElementById('modalInner').innerHTML=html;document.getElementById('modalBg').classList.add('open');}
function closeM(){document.getElementById('modalBg').classList.remove('open');}
function closeMBg(e){if(e.target===document.getElementById('modalBg'))closeM();}
function switchMTab(btn,tabId){
  btn.closest('.modal').querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.modal').querySelectorAll('.mbody').forEach(d=>d.classList.remove('active'));
  const el=document.getElementById(tabId);
  if(el) el.classList.add('active');
}
