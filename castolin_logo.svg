<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 210" width="520" height="210">
  <!-- Castolin Eutectic Logo Recreation -->

  <!-- Horizontal bar through center (full width) -->
  <line x1="0" y1="105" x2="520" y2="105" stroke="#D40000" stroke-width="4"/>
  <!-- Vertical bar through globe center -->
  <line x1="260" y1="0" x2="260" y2="210" stroke="#D40000" stroke-width="4"/>

  <!-- Globe outline -->
  <circle cx="260" cy="105" r="78" fill="none" stroke="#D40000" stroke-width="4"/>

  <!-- Globe equator ellipse -->
  <ellipse cx="260" cy="105" rx="78" ry="24" fill="none" stroke="#D40000" stroke-width="2.5"/>

  <!-- Upper latitude arc -->
  <path d="M 199 76 Q 260 52 321 76" fill="none" stroke="#D40000" stroke-width="2.5"/>
  <!-- Lower latitude arc -->
  <path d="M 199 134 Q 260 158 321 134" fill="none" stroke="#D40000" stroke-width="2.5"/>

  <!-- Upper-upper arc (near pole) -->
  <path d="M 228 38 Q 260 27 292 38" fill="none" stroke="#D40000" stroke-width="2"/>
  <!-- Lower-lower arc (near pole) -->
  <path d="M 228 172 Q 260 183 292 172" fill="none" stroke="#D40000" stroke-width="2"/>

  <!-- Left meridian arc -->
  <path d="M 260 27 Q 218 105 260 183" fill="none" stroke="#D40000" stroke-width="2"/>
  <!-- Right meridian arc -->
  <path d="M 260 27 Q 302 105 260 183" fill="none" stroke="#D40000" stroke-width="2"/>

  <!-- Text: Upper Left "Castolin" -->
  <text x="118" y="92"
    font-size="40"
    font-weight="900"
    font-style="italic"
    font-family="'Arial Black', Impact, 'Arial Bold', Arial, sans-serif"
    fill="#D40000"
    text-anchor="middle">Castolin</text>

  <!-- Text: Upper Right "Eutectic®" -->
  <text x="402" y="92"
    font-size="40"
    font-weight="900"
    font-style="italic"
    font-family="'Arial Black', Impact, 'Arial Bold', Arial, sans-serif"
    fill="#D40000"
    text-anchor="middle">Eutectic</text>
  <text x="470" y="66"
    font-size="16"
    font-weight="900"
    font-family="Arial, sans-serif"
    fill="#D40000">&#174;</text>

  <!-- Text: Lower Left "Eutectic" -->
  <text x="118" y="155"
    font-size="40"
    font-weight="900"
    font-style="italic"
    font-family="'Arial Black', Impact, 'Arial Bold', Arial, sans-serif"
    fill="#D40000"
    text-anchor="middle">Eutectic</text>

  <!-- Text: Lower Right "Castolin" -->
  <text x="402" y="155"
    font-size="40"
    font-weight="900"
    font-style="italic"
    font-family="'Arial Black', Impact, 'Arial Bold', Arial, sans-serif"
    fill="#D40000"
    text-anchor="middle">Castolin</text>
</svg>
